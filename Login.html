
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber</title>
    <link rel="stylesheet" href="GlobalStyle.css">
    <link rel="stylesheet" href="Login.css">
</head>
<body>
   <header class="Login-header">
        <h1>Uber</h1>
    </header>

    <main class="Login-container">
        <div class="Login-box">
            <h2>What's your phone number or email?</h2>
            
            <form class="Input-section">
                <input type="text" placeholder="Enter phone number or email" class="main-input">
                <button type="submit" class="btn-secondary full-width">Continue</button>
            </form>
            <p>New User? <a href="Signupuser.html">SignUp</a></p>

            <div class="divider"><span>or</span></div>

            <div class="social-section">
                <button class="btn-secondary"><img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="" width="25"> Continue with Google</button>
                <button class="btn-secondary"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="" width="16"> Continue with Apple</button>
            </div>
            
            <p class="footer-note">By proceeding, you consent to get calls, WhatsApp or SMS messages, including by automated means, from Uber and its affiliates to the number provided.</p>
        </div>
    </main>
</body>
</html>
