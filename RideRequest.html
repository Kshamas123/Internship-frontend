    function toggleDropdown() {
        document.getElementById("myDropdown").classList.toggle("show");
    }

    // Close the dropdown if the user clicks outside of it
    window.onclick = function (event) {
        if (!event.target.matches('.dropbtn')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }
    function showOptions() {
        const input = document.getElementById('Pickup_Location');
        const query = input.value.toLowerCase();
        const ul = document.getElementById("placelist");

        ul.innerHTML = "";

        if (query.length < 1) {
            ul.style.display = "none";
            return;
        }


        let count = 0;
        for (let i = 0; i < indianLocations.length; i++) {
            const location = indianLocations[i].locality + " , " + indianLocations[i].city + " , " + indianLocations[i].state;

            if (location.toLowerCase().includes(query)) {
                const li = document.createElement("li");
                li.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${location}`;
                li.className = "place-item";


                li.onclick = function () {
                    input.value = location;
                    ul.style.display = "none";
                };

                ul.appendChild(li);
                count++;
            }

            // Limit results so the box doesn't get too long
            if (count > 5) break;
        }

        // 4. Show the list only if matches were found
        ul.style.display = count > 0 ? "block" : "none";
    }
