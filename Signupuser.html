<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="GlobalStyle.css">
    <link rel="stylesheet" href="Signupuser.css">
</head>
<body>
    <header class="Login-header">
        <h1>Uber</h1>
    </header>
    <main class="SignUp-Container">
        <div class="SignupBox">
            <h1>SignUp</h1>
            <label for="Name">Name: </label>
                <input type="text" name="user_name" id="user_name" placeholder="Enter Your Name" class="main-input">
            <label for="Name">Email: </label>
                <input type="email" name="user_email" id="user_email" placeholder="Enter Your Email" class="main-input">
            <label for="Name">Phone Number: </label>
                <input type="text" name="user_no" id="user_no" placeholder="Enter Your Number" class="main-input">
            <label for="password">Password: </label>
            <input type="password" name="user_password" id="user_password" placeholder="Enter Your Password" class="main-input">
            <button type="submit" class="btn-secondary full-width">Continue</button>
        </div>
    </main>
</body>
</html>
