

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="GlobalStyle.css">
    <link rel="stylesheet" href="Signupuser.css">
</head>
<body>
    <header class="Login-header">
        <h1 class="logo">Axis</h1>
    </header>
    <main class="SignUp-Container">
        <div class="SignupBox">
            <h1>SignUp</h1>
            
            <form action="/submit-signup" method="POST">
                <div class="input-group">
                    <label for="user_name">Name:</label>
                    <input type="text" name="user_name" id="user_name" placeholder="Enter Your Name" class="main-input" required>
                </div>

                <div class="input-group">
                    <label for="user_email">Email:</label>
                    <input type="email" name="user_email" id="user_email" placeholder="Enter Your Email" class="main-input" required>
                </div>

                <div class="input-group">
                    <label for="user_no">Phone Number:</label>
                    <input type="text" name="user_no" id="user_no" placeholder="Enter Your Number" class="main-input" required>
                </div>

                <div class="input-group">
                    <label for="user_password">Password:</label>
                    <input type="password" name="user_password" id="user_password" placeholder="Enter Your Password" class="main-input" required>
                </div>

                <button type="submit" class="btn-secondary full-width">Continue</button>
            </form>
            </div>
    </main>
   <section class="Uber-benfituser-section">
    <h2 class="h1-benefit">Why Choose Axis?</h2>
    
    <div class="benefit-container">
        <div class="benefit-card">
            <div class="benefit-icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h3>Secure Payments</h3>
            <p>Your transactions are protected with industry-leading encryption.</p>
        </div>

        <div class="benefit-card">
            <div class="benefit-icon">
                <i class="fa-solid fa-id-badge"></i>
            </div>
            <h3>Verified Drivers</h3>
            <p>Every driver is background-checked for your safety and comfort.</p>
        </div>

        <div class="benefit-card">
            <div class="benefit-icon">
                <i class="fa-solid fa-money-bill-1"></i>
            </div>
            <h3>Exciting Discounts</h3>
            <p>Save more on every ride with our exclusive loyalty rewards.</p>
        </div>
    </div>
</section>
</body>
</html>
