<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber App</title>
    <link rel="stylesheet" href="GlobalStyle.css">
    <link rel="stylesheet" href="Landingpage.css">
</head>
<body>
    <header class="main-header">
        <h1 class="logo">Uber</h1>
        <p class="tagline">Move With Purpose</p>
    </header>

    <div class="row_section">
        <div class="column rider_column">
            <div class="content">
                <h2>RIDER</h2>
                <p>Ride with us. Get where you're going smoothly.</p>
            </div>
            <button class="btn-primary">LOGIN TO RIDE</button>
        </div>

        <div class="column driver_column">
            <div class="content">
                <h2>DRIVER</h2>
                <p>Drive with us. Your car, your schedule, your earnings.</p>
            </div>
            <button class="btn-primary">LOGIN TO DRIVE</button>
        </div>
    </div>
</body>
</html>
